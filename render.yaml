services:
  - type: web
    name: spare-parts-stock-tool
    runtime: node
    plan: free
    branch: main
    buildCommand: >-
      cd client && npm install && npm run build &&
      cd ../server && npm install && npx prisma generate && npx prisma migrate deploy &&
      rm -rf public && cp -r ../client/dist public
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
